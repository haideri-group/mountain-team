name: Deploy — Staging

# Fires on every push to the `stage` branch. Builds a Docker image, pushes it
# to ghcr.io, then SSHes into the homelab to pull + restart the staging stack.
# Migrations run via `tsx scripts/migrate-all.ts --apply` inside a one-shot
# container before the long-lived web container starts, so schema lands before
# code. tsx is invoked directly (not through yarn) because the runtime image
# doesn't ship yarn.lock — yarn would fail workspace validation before the
# migration script ever executes.

on:
  push:
    branches: [stage]
  workflow_dispatch: # manual re-run button

concurrency:
  # Only one staging deploy in flight at a time. `cancel-in-progress: false`
  # means newer pushes QUEUE behind the current run — we don't cancel a deploy
  # mid-migration. Queue depth >1 means the intermediate run is wasted but
  # never leaves the DB in a half-migrated state.
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Tag scheme: stage-latest (mutable, what compose pulls) + stage-<sha> (audit/rollback).
  LATEST_TAG: stage-latest

jobs:
  checks:
    name: Type-check + Lint
    runs-on: ubuntu-latest
    # Guard: workflow_dispatch can fire from any branch/tag. Staging must
    # only ever be built + deployed from the `stage` branch — otherwise a
    # manual trigger from a feature branch would overwrite `stage-latest`
    # with that branch's code and push it to the homelab.
    if: github.ref == 'refs/heads/stage'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable Corepack
        run: corepack enable && corepack prepare yarn@4.13.0 --activate
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            node_modules
          key: yarn-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn type-check
      # Lint is advisory for now — the codebase has pre-existing
      # `no-explicit-any` errors in legacy files (seed.ts, overview-dashboard,
      # webhooks/github, etc.) that predate this staging pipeline. Keeping the
      # step for visibility but not letting it block the deploy; clean up in a
      # dedicated `chore/lint-cleanup` PR later.
      - run: yarn lint
        continue-on-error: true

  build-and-push:
    name: Build + Push Image
    needs: checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage'
    # Opts into the `staging` GitHub Environment so env-scoped vars
    # (NEXT_PUBLIC_APP_URL, etc.) are available during the build.
    # Environment branch protection also blocks workflow_dispatch from
    # any branch other than `stage` at the platform level.
    environment: staging
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          SHA_TAG="stage-${SHA_SHORT}"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "Will tag image as: ${{ env.LATEST_TAG }} + ${SHA_TAG}"

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.LATEST_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
          # NEXT_PUBLIC_* vars are baked in at build time — pass via build-args.
          build-args: |
            NEXT_PUBLIC_JIRA_BASE_URL=${{ vars.NEXT_PUBLIC_JIRA_BASE_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: SSH Deploy → Homelab
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/stage'
    # Opts into the `staging` GitHub Environment so env-scoped secrets
    # (SSH_HOST, SSH_USER, SSH_KEY, GHCR_READ_TOKEN) and vars (SSH_PORT,
    # GHCR_READ_USER) resolve. Without this, `${{ secrets.* }}` silently
    # expand to empty and appleboy/ssh-action aborts with "missing server host".
    environment: staging
    steps:
      - name: Deploy to homelab
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /home/haider/teamflow-staging

            echo "▶ Logging in to GHCR from server…"
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ vars.GHCR_READ_USER }}" --password-stdin

            echo "▶ Pulling new image…"
            docker compose pull web

            echo "▶ Running migrations (one-shot container)…"
            # One-shot container: uses the NEW image's migrate script, reaches MySQL
            # via the shared network, exits when done. --rm + --no-deps ensures we
            # don't spin up sibling services that don't exist anyway.
            #
            # tsx invoked directly instead of via `yarn db:migrate:apply` — the
            # runtime image omits yarn.lock (Next.js standalone ships a stripped
            # package.json), so yarn 4 aborts on workspace validation before the
            # migration script runs. scripts/migrate-all.ts is already idempotent
            # and no-ops cleanly when there are zero pending migrations.
            docker compose run --rm --no-deps web node_modules/.bin/tsx scripts/migrate-all.ts --apply

            echo "▶ Restarting web with new image…"
            docker compose up -d web

            echo "▶ Waiting for /api/health…"
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:3007/api/health >/dev/null; then
                echo "  ✓ Healthy after ${i} attempt(s)."
                exit 0
              fi
              sleep 2
            done
            echo "  ✗ Health check failed after 60s. Dumping recent logs:"
            docker compose logs --tail 80 web
            exit 1

      - name: Report success
        if: success()
        run: |
          echo "::notice title=Staging deployed::Image ${{ needs.build-and-push.outputs.sha_tag }} is live at https://staging-haider-team.appz.cc"
